<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单详情 - TripVerse</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="orders">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html"><span class="brand-mark">TV</span><span>TripVerse</span></a>
      <nav class="nav-links">
        <a data-nav="home" href="index.html">首页</a>
        <a data-nav="search" href="search.html">购票</a>
        <a data-nav="orders" href="orders.html">订单</a>
        <a data-nav="profile" href="profile.html">个人中心</a>
        <a data-nav="driver" href="driver-dashboard.html">司机端</a>
        <a data-nav="admin" href="admin-dashboard.html">管理端</a>
        <a data-nav="ai" href="ai-assistant.html">AI 助手</a>
      </nav>
      <button class="menu-button" type="button" data-nav-toggle>菜单</button>
    </div>
    <div class="mobile-drawer">
      <div class="container mobile-links">
        <a data-nav="home" data-nav-close href="index.html">首页</a>
        <a data-nav="search" data-nav-close href="search.html">购票</a>
        <a data-nav="orders" data-nav-close href="orders.html">订单</a>
        <a data-nav="profile" data-nav-close href="profile.html">个人中心</a>
        <a data-nav="driver" data-nav-close href="driver-dashboard.html">司机端</a>
        <a data-nav="admin" data-nav-close href="admin-dashboard.html">管理端</a>
        <a data-nav="ai" data-nav-close href="ai-assistant.html">AI 助手</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="page-hero">
        <div class="row-between">
          <div>
            <span class="eyebrow">订单详情</span>
            <h1 class="section-title" data-order-detail-title>订单加载中...</h1>
          </div>
          <span class="badge" data-order-detail-status>--</span>
        </div>
      </section>

      <section class="split-grid">
        <article class="panel">
          <h2 class="subhead">乘车信息</h2>
          <div class="timeline section-block" data-order-detail-timeline>
            <div class="timeline-item">
              <span class="timeline-dot"></span>
              <strong>正在加载出发信息</strong>
              <p class="muted">请稍候...</p>
            </div>
          </div>
          <div class="list-stack section-block" data-order-detail-meta>
            <div class="list-item">
              <strong>订单信息</strong>
              <div class="list-meta"><span>加载中</span><span>--</span></div>
            </div>
          </div>
        </article>

        <aside class="panel">
          <h2 class="subhead">操作面板</h2>
          <div class="pricing-box section-block" data-order-detail-pricing>
            <div class="pricing-row"><span>票价</span><strong>--</strong></div>
            <div class="pricing-row"><span>数量</span><strong>--</strong></div>
            <div class="pricing-row pricing-total"><span>实付</span><strong>--</strong></div>
          </div>
          <div class="button-row section-block" data-order-detail-actions>
            <a class="button button-secondary" href="orders.html">返回订单列表</a>
          </div>
        </aside>
      </section>
    </div>
  </main>

  <footer class="footer"><div class="container footer-card">订单详情页已预留电子票、退款、支付续单等关键操作入口。</div></footer>
  <script src="assets/runtime-config.js?v=20260507-payment-expire"></script>
  <script src="assets/app.js?v=20260507-payment-expire"></script>
</body>
</html>
