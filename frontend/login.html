<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TripVerse</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">TV</span>
        <span>TripVerse</span>
      </a>
      <nav class="nav-links"></nav>
      <button class="menu-button" type="button" data-nav-toggle>菜单</button>
    </div>
    <div class="mobile-drawer">
      <div class="container mobile-links"></div>
    </div>
  </header>

  <main class="page">
    <div class="container auth-layout">
      <section class="auth-card">
        <span class="eyebrow">用户中心 / 登录</span>
        <h1 class="section-title">登录 TripVerse</h1>
        <p class="lede">支持手机号 + 密码登录，或邮箱 + 验证码登录。</p>

        <form class="section-block" data-auth-form="login">
          <div class="form-grid">
            <div class="field span-6">
              <label>登录身份</label>
              <select name="role">
                <option value="passenger">乘客</option>
                <option value="driver">司机</option>
                <option value="admin">管理员</option>
              </select>
            </div>
            <div class="field span-6">
              <label>登录方式</label>
              <select name="loginMode" data-login-mode>
                <option value="password">密码登录</option>
                <option value="code">邮箱验证码登录</option>
              </select>
            </div>

            <div class="field span-12" data-phone-group>
              <label>手机号</label>
              <input type="tel" name="phone" placeholder="请输入手机号">
            </div>

            <div class="field span-12" data-password-group>
              <label>密码</label>
              <input type="password" name="password" placeholder="请输入密码">
            </div>

            <div class="field span-12" data-email-group style="display:none;">
              <label>邮箱</label>
              <input type="email" name="email" placeholder="请输入邮箱">
            </div>

            <div class="field span-8" data-code-group style="display:none;">
              <label>邮箱验证码</label>
              <input type="text" name="emailCode" placeholder="请输入验证码">
            </div>

            <div class="field span-4" data-code-group style="display:none;">
              <label>发送验证码</label>
              <button class="button button-secondary" type="button" data-send-code>发送验证码</button>
            </div>
          </div>

          <div class="button-row section-block">
            <button class="button button-primary" type="submit">立即登录</button>
            <a class="button button-ghost" href="register.html">去注册</a>
          </div>
        </form>
      </section>

      <aside class="auth-side">
        <article class="auth-card">
          <h2 class="subhead">登录后可用</h2>
          <div class="list-stack section-block">
            <div class="info-card">
              <strong>乘客</strong>
              <p class="muted">查看票务、创建订单、支付、退改签、管理个人资料。</p>
            </div>
            <div class="info-card">
              <strong>司机</strong>
              <p class="muted">发布班次、管理订单、查看收益、使用 AI 生成班次草稿。</p>
            </div>
            <div class="info-card">
              <strong>管理员</strong>
              <p class="muted">进入管理后台，查看用户、订单、风控、知识库与模型配置。</p>
            </div>
          </div>
        </article>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-card">管理员账号可直接使用密码登录；如果已配置邮箱，也可以使用邮箱验证码登录。</div>
  </footer>
  <script src="assets/runtime-config.js?v=20260506-admin-login"></script>
  <script>
    (function () {
      const STORAGE_KEY = "tripverse_auth";
      const form = document.querySelector("[data-auth-form='login']");
      if (!form) {
        return;
      }

      const runtime = window.__TRIPVERSE_RUNTIME__ || { apiBaseUrl: "http://localhost:8080/api", timeout: 10000 };
      const modeSelect = form.querySelector("[data-login-mode]");
      const phoneGroups = Array.from(form.querySelectorAll("[data-phone-group]"));
      const passwordGroups = Array.from(form.querySelectorAll("[data-password-group]"));
      const emailGroups = Array.from(form.querySelectorAll("[data-email-group]"));
      const codeGroups = Array.from(form.querySelectorAll("[data-code-group]"));

      function showToast(message) {
        window.alert(String(message || "操作失败"));
      }

      function toggleGroups() {
        const mode = String(modeSelect?.value || "password");
        const isPassword = mode === "password";

        phoneGroups.forEach((node) => {
          node.style.display = isPassword ? "grid" : "none";
        });
        passwordGroups.forEach((node) => {
          node.style.display = isPassword ? "grid" : "none";
        });
        emailGroups.forEach((node) => {
          node.style.display = isPassword ? "none" : "grid";
        });
        codeGroups.forEach((node) => {
          node.style.display = isPassword ? "none" : "grid";
        });
      }

      function getRoleHome(role) {
        switch (role) {
          case "driver":
            return "driver-dashboard.html";
          case "admin":
            return "admin-dashboard.html";
          default:
            return "index.html";
        }
      }

      async function request(path, payload) {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), Number(runtime.timeout || 10000));

        try {
          const response = await window.fetch(String(runtime.apiBaseUrl || "http://localhost:8080/api") + path, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok || Number(data.code || 0) !== 0) {
            throw new Error(data.message || "请求失败");
          }
          return data.data || {};
        } finally {
          window.clearTimeout(timer);
        }
      }

      if (modeSelect) {
        modeSelect.addEventListener("change", toggleGroups);
      }
      toggleGroups();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = new window.FormData(form);
        const role = String(formData.get("role") || "passenger").trim();
        const loginMode = String(formData.get("loginMode") || "password").trim();
        const phone = String(formData.get("phone") || "").trim();
        const password = String(formData.get("password") || "").trim();
        const email = String(formData.get("email") || "").trim();
        const emailCode = String(formData.get("emailCode") || "").trim();

        try {
          let result = {};
          if (loginMode === "password") {
            if (!phone || !password) {
              showToast("请输入手机号和密码");
              return;
            }
            result = await request("/auth/login/password", { role, phone, password });
          } else {
            if (!email || !emailCode) {
              showToast("请输入邮箱和验证码");
              return;
            }
            result = await request("/auth/login/code", { role, email, emailCode });
          }

          const user = result.user || {};
          const authState = {
            token: result.token || "",
            role: user.role || role,
            phone: user.phone || phone,
            email: user.email || email,
            nickname: user.nickname || "",
            status: user.status || "active",
          };

          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(authState));
          showToast("登录成功");
          window.location.href = getRoleHome(authState.role);
        } catch (error) {
          showToast(error.message || "登录失败");
        }
      });

      document.querySelectorAll("[data-send-code]").forEach((button) => {
        button.addEventListener("click", async () => {
          const emailInput = form.querySelector("[name='email']");
          const email = String(emailInput?.value || "").trim();
          if (!email) {
            showToast("请输入邮箱");
            return;
          }

          try {
            await request("/auth/email/send", {
              email,
              scene: "login",
            });
            showToast("验证码已发送");
          } catch (error) {
            showToast(error.message || "发送验证码失败");
          }
        });
      });
    })();
  </script>
  <script src="assets/app.js?v=20260506-admin-login"></script>
</body>
</html>
