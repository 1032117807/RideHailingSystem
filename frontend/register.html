<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - TripVerse</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="register">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">TV</span>
        <span>TripVerse</span>
      </a>
      <nav class="nav-links"></nav>
      <button class="menu-button" type="button" data-nav-toggle>菜单</button>
    </div>
    <div class="mobile-drawer">
      <div class="container mobile-links"></div>
    </div>
  </header>

  <main class="page">
    <div class="container auth-layout">
      <section class="auth-card">
        <span class="eyebrow">用户中心 / 注册</span>
        <h1 class="section-title">创建账号</h1>
        <p class="lede">注册需要手机号、邮箱、邮箱验证码和登录密码。</p>

        <form class="section-block" data-auth-form="register">
          <div class="form-grid">
            <div class="field span-6">
              <label>注册身份</label>
              <select name="role">
                <option value="passenger">乘客</option>
                <option value="driver">司机</option>
              </select>
            </div>
            <div class="field span-6">
              <label>昵称</label>
              <input type="text" name="nickname" placeholder="请输入昵称">
            </div>
            <div class="field span-12" data-phone-group>
              <label>手机号</label>
              <input type="tel" name="phone" placeholder="请输入手机号">
            </div>
            <div class="field span-12" data-email-group>
              <label>邮箱</label>
              <input type="email" name="email" placeholder="请输入邮箱">
            </div>
            <div class="field span-8" data-code-group>
              <label>邮箱验证码</label>
              <input type="text" name="emailCode" placeholder="请输入验证码">
            </div>
            <div class="field span-4" data-code-group>
              <label>发送验证码</label>
              <button class="button button-secondary" type="button" data-send-code>发送验证码</button>
            </div>
            <div class="field span-12" data-password-group>
              <label>登录密码</label>
              <input type="password" name="password" placeholder="请输入登录密码">
            </div>
          </div>
          <div class="button-row section-block">
            <button class="button button-primary" type="submit">注册并登录</button>
            <a class="button button-ghost" href="login.html">已有账号，去登录</a>
          </div>
        </form>
      </section>

      <aside class="auth-side">
        <article class="auth-card">
          <h2 class="subhead">注册后可做什么</h2>
          <div class="list-stack section-block">
            <div class="info-card">
              <strong>乘客账号</strong>
              <p class="muted">搜索票务、下单支付、查询历史订单、使用 AI 助手选票。</p>
            </div>
            <div class="info-card">
              <strong>司机账号</strong>
              <p class="muted">发布班次、管理售票、查看座位占用和收益统计。</p>
            </div>
          </div>
        </article>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-card">当前注册流程已改为邮箱验证码注册，开发环境下验证码会由后端记录到日志。</div>
  </footer>
  <script src="assets/runtime-config.js?v=20260501-frontend-link"></script>
  <script src="assets/app.js?v=20260501-frontend-link"></script>
</body>
</html>
