        <a data-nav="driver" data-nav-close href="driver-dashboard.html">司机端</a>

  <main class="page">
    <div class="container">
      <div class="tab-strip">
        <a href="admin-dashboard.html">后台首页</a>
        <a href="admin-users.html">用户管理</a>
        <a href="admin-orders.html">订单管理</a>

      <section class="page-hero">
        <span class="eyebrow">模型配置</span>
        <h1 class="section-title">管理模型供应商、温度和路由策略</h1>
      </section>

      <section class="split-grid">
        <article class="panel">
          <div class="form-grid">
            <div class="field span-6">
              <label>默认对话模型</label>
              <select>
                <option>TripVerse-LM-70B</option>
                <option>TripVerse-LM-13B</option>
              </select>
            </div>
            <div class="field span-6">
              <label>温度</label>
              <input type="number" value="0.3" step="0.1">
            </div>
            <div class="field span-6">
              <label>最大输出 Token</label>
              <input type="number" value="2048">
            </div>
            <div class="field span-6">
              <label>高风险请求路由</label>
              <select>
                <option>先审查再主模型</option>
                <option>主模型直出</option>
              </select>
            </div>
          </div>
          <div class="button-row section-block">
            <button class="button button-primary" type="button" data-toast="模型配置已保存">保存配置</button>
          </div>
        </article>

        <aside class="panel">
          <h2 class="subhead">当前策略</h2>
          <div class="list-stack section-block">
            <div class="info-card">
              <strong>简单问答</strong>
              <p class="muted">优先走小模型，降低成本与延迟。</p>
            </div>
            <div class="info-card">
              <strong>复杂路线推荐</strong>
              <p class="muted">走大模型 + RAG + 重排服务。</p>
            </div>
          </div>
        </aside>
      </section>
    </div>
  </main>

  <footer class="footer"><div class="container footer-card">模型配置页已预留核心参数和路由策略，便于后续做多模型治理。</div></footer>
