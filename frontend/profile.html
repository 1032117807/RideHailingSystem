<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - TripVerse</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="profile">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html"><span class="brand-mark">TV</span><span>TripVerse</span></a>
      <nav class="nav-links"></nav>
      <button class="menu-button" type="button" data-nav-toggle>菜单</button>
    </div>
    <div class="mobile-drawer">
      <div class="container mobile-links"></div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="page-hero">
        <div class="row-between">
          <div>
            <span class="eyebrow">个人中心</span>
            <h1 class="section-title">账户资料与站内提醒</h1>
          </div>
          <button class="button button-secondary" type="button" data-save-profile>保存修改</button>
        </div>
      </section>

      <section class="split-grid">
        <article class="panel">
          <div class="form-grid">
            <div class="field span-6">
              <label>昵称</label>
              <input name="nickname" type="text" value="">
            </div>
            <div class="field span-6">
              <label>手机号</label>
              <input name="phone" type="tel" value="" readonly>
            </div>
            <div class="field span-6">
              <label>实名状态</label>
              <input name="realNameVerified" type="text" value="" readonly>
            </div>
            <div class="field span-6">
              <label>默认身份</label>
              <select name="defaultRole">
                <option value="passenger">乘客</option>
                <option value="driver">司机</option>
              </select>
            </div>
            <div class="field span-12">
              <label>通知说明</label>
              <textarea name="notificationText">站内提醒会同步展示退款审核结果、订单超时取消等重要通知。</textarea>
            </div>
          </div>
        </article>

        <aside class="panel">
          <h2 class="subhead">常用说明</h2>
          <div class="list-stack section-block">
            <div class="list-item">
              <strong>退款审核提醒</strong>
              <div class="list-meta"><span>管理员通过或驳回后会自动通知</span><span>实时同步</span></div>
            </div>
            <div class="list-item">
              <strong>订单超时提醒</strong>
              <div class="list-meta"><span>未支付订单超时后自动通知</span><span>避免错过状态变更</span></div>
            </div>
            <div class="list-item">
              <strong>订单跳转</strong>
              <div class="list-meta"><span>通知支持直接进入订单详情</span><span>便于继续处理</span></div>
            </div>
          </div>
        </aside>
      </section>

      <section class="section-block">
        <article class="panel">
          <div class="row-between">
            <div>
              <span class="eyebrow">站内提醒</span>
              <h2 class="subhead">订单与退款通知</h2>
            </div>
            <div class="button-row">
              <span class="mini-chip" data-notification-unread>未读 --</span>
              <button class="button button-secondary" type="button" data-notification-read-all>全部已读</button>
            </div>
          </div>

          <div class="list-stack section-block" data-notification-list>
            <div class="info-card">
              <strong>正在加载通知...</strong>
              <p class="muted">系统正在同步你的订单和退款提醒。</p>
            </div>
          </div>
        </article>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-card">个人中心现在会展示后端真实站内通知，包括退款审核结果和订单超时取消提醒。</div>
  </footer>

  <script src="assets/runtime-config.js?v=20260507-notification-center"></script>
  <script src="assets/app.js?v=20260507-notification-center"></script>
</body>
</html>
