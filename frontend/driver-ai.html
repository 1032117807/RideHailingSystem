<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>司机 AI 辅助 - TripVerse</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="driver">
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html"><span class="brand-mark">TV</span><span>TripVerse</span></a>
      <nav class="nav-links"></nav>
      <button class="menu-button" type="button" data-nav-toggle>菜单</button>
    </div>
    <div class="mobile-drawer">
      <div class="container mobile-links"></div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="tab-strip">
        <a href="driver-dashboard.html">司机首页</a>
        <a href="driver-publish.html">发布班次</a>
        <a href="driver-trips.html">班次管理</a>
        <a href="driver-trip-detail.html">班次详情</a>
        <a href="driver-income.html">收益页</a>
        <a class="is-active" href="driver-ai.html">AI 辅助</a>
      </div>

      <section class="page-hero">
        <span class="eyebrow">司机 AI 辅助</span>
        <h1 class="section-title">自然语言生成班次草稿</h1>
        <p class="muted">输入一句话，让 AI 自动解析起终点、发车时间、座位数、票价和途经站点，再一键写入发布页。</p>
      </section>

      <section class="split-grid">
        <article class="panel">
          <form class="search-card" data-driver-ai-form>
            <div class="field span-12">
              <label for="driver-ai-prompt">班次描述</label>
              <textarea
                id="driver-ai-prompt"
                name="prompt"
                placeholder="例如：明晚18:30从杭州东到苏州北，商务大巴，24座，票价168，途经嘉兴南、上海虹桥，预计2小时15分"
              ></textarea>
            </div>
            <div class="button-row">
              <button class="button button-primary" type="submit">生成草稿</button>
            </div>
          </form>
        </article>

        <aside class="panel">
          <h2 class="subhead">生成结果</h2>
          <div class="list-stack section-block" data-driver-ai-result>
            <div class="info-card">
              <strong>等待生成</strong>
              <p class="muted">生成成功后，这里会显示结构化班次草稿和 AI 建议。</p>
            </div>
          </div>
          <div class="list-stack section-block" data-driver-ai-validation></div>
          <div class="button-row section-block">
            <button class="button button-primary" type="button" data-driver-ai-publish disabled>一键发布</button>
            <button class="button button-dark" type="button" data-driver-ai-apply disabled>写入发布页</button>
            <a class="button button-secondary" href="driver-publish.html">打开发布页</a>
          </div>
        </aside>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-card">司机 AI 页面会把自然语言描述转成结构化班次草稿，方便继续去发布页微调和提交。</div>
  </footer>

  <script src="assets/runtime-config.js?v=20260507-driver-ai"></script>
  <script src="assets/app.js?v=20260507-driver-ai"></script>
</body>
</html>
